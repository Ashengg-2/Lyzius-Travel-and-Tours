# Optional: local PostgreSQL for API development (`docker compose up -d`).
# Host port **5433** avoids clashing with a local Postgres install (often on :5432).
# Requires Docker Desktop running.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lyzius
      POSTGRES_PASSWORD: lyzius
      POSTGRES_DB: lyzius
    ports:
      - "5433:5432"
    volumes:
      - lyzius_pg:/var/lib/postgresql/data

volumes:
  lyzius_pg:
